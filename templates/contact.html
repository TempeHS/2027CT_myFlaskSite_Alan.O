{% extends 'base.html' %} {% block title %}Contact - My Flask Site{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="text-center mb-5 elms-sans-hero-title">Contact Us</h1>

  <div class="row">
    <!-- Map Column -->
    <div class="col-lg-6 mb-4">
      <div>
        <img
          src="{{ url_for('static', filename='images/animation-dynamic.webp') }}"
          class="d-block w-100"
          alt="Contact"
        />
      </div>
    </div>

    <!-- Form Column -->
    <div class="col-lg-6 mb-4">
      <div class="contact-form">
        <h4 class="mb-4 elms-sans-hero-title">Send us a Message - We'll respond as soon as we can</h4>
        <form action="#" method="POST">
          <div class="mb-3">
            <label for="name" class="form-label">Your Name *</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              placeholder="John Smith"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address *</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="john@example.com"
              required
            />
          </div>
          <div class="mb-3 ">
          <label for="subject" class="form-label">Subject</label>
          <input
            class="form-control"
            d="subject"
            name="subject"
            type="text"
            list="subject-options"
            placeholder="Type a subject..."
          />
          <div class="mb-3">
            <label for="message" class="form-label">Message *</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="5"
              placeholder="How can we help you?"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 elms-sans-hero-title">
            Send Message
          </button>
        </form>
      </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}

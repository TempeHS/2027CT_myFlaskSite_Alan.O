{% extends 'base.html' %} {% block title %}Search - My Flask Site{% endblock %}
{% block content %}
<div class="container mt-5">
  <h1 class="elms-sans-hero-title">Search Results for "{{ query }}"</h1>
  <h2>
    <a class="elms-sans-hero-title" href="{{ url_for('library') }}"
      >Click Here to See Our Library
    </a>
  </h2>

  {% if query %}
  <p class="text-muted">More References Coming Soon...</p>
  {% else %}
  <p class="text-muted">Please enter a search term.</p>
  {% endif %}
</div>
{% endblock %}
